<form class="create-form" (ngSubmit)="SaveNote()">
  <div class="form-group">
    <input type="text" [(ngModel)]="note.title" name="title" placeholder="Note title..."
      class="form-input form-input--title" />
  </div>

  <div class="form-group">
    <textarea [(ngModel)]="note.content" name="content" placeholder="Your thoughts..." class="form-textarea"
      rows="5"></textarea>
  </div>

  <button type="submit" class="form-submit">Save Note</button>
</form>
